dbs:
  - path: /app/data/storage.sqlite
    replicas:
      - type: s3
        name: supabase
        bucket: ${LITESTREAM_BUCKET}
        # Prefix cố định trên S3 để dễ theo dõi theo môi trường/app.
        # Ví dụ:
        #   LITESTREAM_PATH=storage/prod
        #   LITESTREAM_PATH=storage/staging
        # Bên trong prefix này, Litestream vẫn tự quản lý thư mục generations/*.
        path: ${LITESTREAM_PATH}
        # FIX: thêm https:// — thiếu protocol gây litestream snapshots fail silently
        # → từng dẫn đến startup.sh nghĩ "không có snapshot" → start fresh → generation mới
        endpoint: https://${SUPABASE_PROJECT_REF}.supabase.co/storage/v1/s3
        access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
        secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}
        force-path-style: true
        sign-payload: true
        region: ap-southeast-1
        # (path đã khai báo 1 lần ở trên — bỏ duplicate trước đây)

        # Sync interval (default 1s) — tăng để giảm request count nếu cần
        # sync-interval: 10s
        # Retention: tự dọn dữ liệu cũ để tránh phình generations/snapshots/wal.
        # Có thể override bằng env, ví dụ: LITESTREAM_RETENTION=168h (7 ngày)
        retention: ${LITESTREAM_RETENTION}
