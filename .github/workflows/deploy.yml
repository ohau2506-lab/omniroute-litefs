# Path: .github/workflows/deploy.yml
name: Deploy Stack

on:
  # push:
  #   branches: ["main"]
  workflow_dispatch:

env:
  RTDB_URL: ${{ secrets.RTDB_URL }}

jobs:
  deploy:
    # ✅ Đổi ở đây để chọn runner: ubuntu-latest | windows-latest
    # runs-on: windows-latest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ================================================================
      #  STEP 1 — Pull .env & credentials từ RTDB
      #  Chạy TRƯỚC detect-OS để không bị ghi đè
      # ================================================================
      - name: Pull .env & credentials from RTDB
        shell: bash
        run: bash .github/scripts/pull-env.sh

      # ================================================================
      #  STEP 2 — Detect OS, append biến vào .env + GITHUB_ENV
      # ================================================================
      - name: Detect OS environment
        shell: bash
        run: bash .github/scripts/detect-os.sh

      # ================================================================
      #  STEP 2b — Inject INSTANCE_ID vào .env
      #
      #  INSTANCE_ID = {run_id}-{attempt}-{runner_name}
      #  → Unique per GitHub Actions run + retry
      #  → Elector dùng để phân biệt instances trong RTDB
      #  → Instance có timestamp mới nhất sẽ tự động win election
      #     qua SSE realtime — không cần poll hay force takeover
      # ================================================================
      - name: Set INSTANCE_ID
        shell: bash
        run: |
          INSTANCE_ID="${{ github.run_id }}-${{ github.run_attempt }}-${{ runner.name }}"
          # Sanitize: chỉ giữ alphanumeric + dash
          INSTANCE_ID=$(echo "$INSTANCE_ID" | tr -cs 'a-zA-Z0-9-' '-' | sed 's/-*$//')
          echo "INSTANCE_ID=${INSTANCE_ID}" >> .env
          echo "INSTANCE_ID=${INSTANCE_ID}" >> "$GITHUB_ENV"
          echo "✅ INSTANCE_ID=$INSTANCE_ID"

      # ================================================================
      #  STEP 3 — Setup môi trường theo OS
      # ================================================================
      - name: Setup environment (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: bash .github/scripts/setup-linux.sh
      # ================================================================
      #  STEP 3 — Check file
      # ================================================================
      - name: Setup environment (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: bash .github/scripts/preflight.sh

      - name: Setup environment (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .github/scripts/setup-windows.ps1

      # ================================================================
      #  STEP 4 — Build & start Docker Compose stack
      #
      #  Sau khi stack up, elector tự động:
      #    1. Ghi timestamp lên RTDB
      #    2. Nhận SSE event khi có instance khác
      #    3. Instance có timestamp mới nhất = Leader
      #    4. Leader start litestream → omniroute → cloudflared
      #    5. Instance cũ tự demote (stop services, giữ hot standby)
      # ================================================================
      - name: Build & start services (Linux)
        if: runner.os == 'Linux'
        shell: bash
        # run: docker compose up -d --build --remove-orphans
        run: docker compose up -d --build --remove-orphans --force-recreate

      - name: Build & start services (Windows/WSL2)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $wsl = $env:WSL_WORKSPACE
          wsl -d Ubuntu -- bash -c "cd '$wsl' && sudo docker compose up -d --build --remove-orphans"

      # ================================================================
      #  STEP 5 — Cleanup
      # ================================================================
      - name: Clean up unused images (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: docker image prune -f

      - name: Clean up unused images (Windows/WSL2)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $wsl = $env:WSL_WORKSPACE
          wsl -d Ubuntu -- bash -c "cd '$wsl' && sudo docker image prune -f"

      # ================================================================
      #  STEP 6 — dotenvrtdb runner keepalive
      #  Giữ GitHub Actions runner alive trong suốt thời gian deploy
      # ================================================================
      - name: dotenvrtdb runner keepalive
        shell: bash
        run: dotenvrtdb runner keepalive

      # ================================================================
      #  STEP 7 — Collect artifacts (always)
      # ================================================================
      - name: Collect docker runtime artifacts (Linux)
        if: always() && runner.os == 'Linux'
        shell: bash
        run: bash .github/scripts/collect-artifacts.sh

      - name: Collect docker runtime artifacts (Windows/WSL2)
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          $wsl = $env:WSL_WORKSPACE
          if (-not $wsl) { Write-Host "WSL_WORKSPACE not set, skipping"; exit 0 }
          wsl -d Ubuntu -- bash -c "cd '$wsl' && bash .github/scripts/collect-artifacts.sh"

      - name: Upload docker runtime artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: docker-runtime
          path: artifacts/docker-runtime
          if-no-files-found: warn
          retention-days: 7
