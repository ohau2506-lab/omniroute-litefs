name: deploy-litefs

on:
  workflow_dispatch:
    inputs:
      node_slot:
        description: "Node slot cố định cho hostname tailscale (vd: 1,2,3)"
        required: true
        default: "1"
      consul_mode:
        description: "Dùng Consul local cho test 1 node hay Consul external dùng chung cho multi-host"
        required: true
        default: "external"
        type: choice
        options:
          - "external"
          - "local"
      skip_cloudflared:
        description: "Bỏ qua bật cloudflared"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
env:
  RTDB_URL: ${{ secrets.RTDB_URL }}
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TS_NODE_NAME: omniroute-node-${{ github.event.inputs.node_slot }}
      TAILSCALE_TAILNET: ${{ secrets.TS_TAILNET }}
      CONSUL_HTTP_ADDR_SECRET: ${{ secrets.CONSUL_HTTP_ADDR }}
      NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
      MACHINE_ID_SALT: ${{ secrets.MACHINE_ID_SALT }}
      STORAGE_ENCRYPTION_KEY: ${{ secrets.STORAGE_ENCRYPTION_KEY }}
      INITIAL_PASSWORD: ${{ secrets.INITIAL_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ================================================================
      #  STEP 1 — Pull .env & credentials từ RTDB
      #  Chạy TRƯỚC detect-OS để không bị ghi đè
      # ================================================================
      - name: Pull .env & credentials from RTDB
        shell: bash
        run: bash .github/scripts/pull-env.sh

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect Tailscale (stable hostname by slot)
        env:
          TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
        run: |
          if [ -z "${TS_AUTHKEY}" ]; then
            echo "TS_AUTHKEY secret is required"
            exit 1
          fi

          sudo tailscale up \
            --authkey="${TS_AUTHKEY}" \
            --hostname="${TS_NODE_NAME}" \
            --accept-dns=true \
            --advertise-tags=tag:ci \
            --reset

          tailscale status

      - name: Resolve INSTANCE_ADDR
        shell: bash
        run: |
          set -euo pipefail

          INSTANCE_NAME="${TS_NODE_NAME}"
          INSTANCE_ADDR="$(bash ./scripts/resolve-instance-addr.sh)"
          CONSUL_MODE="${{ github.event.inputs.consul_mode }}"

          if [ "$CONSUL_MODE" = "external" ]; then
            if [ -z "${CONSUL_HTTP_ADDR_SECRET:-}" ]; then
              echo "CONSUL_HTTP_ADDR secret is required when consul_mode=external"
              exit 1
            fi
            CONSUL_HTTP_ADDR="${CONSUL_HTTP_ADDR_SECRET}"
            CONSUL_CHECK_ADDR="${CONSUL_HTTP_ADDR_SECRET}"
          else
            CONSUL_HTTP_ADDR="http://consul:8500"
            CONSUL_CHECK_ADDR="http://127.0.0.1:8500"
          fi

          echo "INSTANCE_NAME=${INSTANCE_NAME}" >> "$GITHUB_ENV"
          echo "INSTANCE_ADDR=${INSTANCE_ADDR}" >> "$GITHUB_ENV"
          echo "CONSUL_HTTP_ADDR=${CONSUL_HTTP_ADDR}" >> "$GITHUB_ENV"
          echo "CONSUL_CHECK_ADDR=${CONSUL_CHECK_ADDR}" >> "$GITHUB_ENV"
          echo "CONSUL_MODE=${CONSUL_MODE}" >> "$GITHUB_ENV"

          echo "Resolved CONSUL_MODE=${CONSUL_MODE}"
          echo "Resolved INSTANCE_NAME=${INSTANCE_NAME}"
          echo "Resolved INSTANCE_ADDR=${INSTANCE_ADDR}"
          echo "Resolved CONSUL_HTTP_ADDR=${CONSUL_HTTP_ADDR}"
          echo "Resolved CONSUL_CHECK_ADDR=${CONSUL_CHECK_ADDR}"

      # - name: Create .env for compose
      #   run: |
      #     cp .env.example .env

      #     cat >> .env <<EOF
      #     NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL}
      #     INSTANCE_NAME=${TS_NODE_NAME}
      #     INSTANCE_ADDR=${INSTANCE_ADDR}
      #     CONSUL_HTTP_ADDR=http://consul:8500
      #     JWT_SECRET=${JWT_SECRET}
      #     API_KEY_SECRET=${API_KEY_SECRET}
      #     MACHINE_ID_SALT=${MACHINE_ID_SALT}
      #     STORAGE_ENCRYPTION_KEY=${STORAGE_ENCRYPTION_KEY}
      #     INITIAL_PASSWORD=${INITIAL_PASSWORD}
      #     EOF

      - name: Boot consul + app
        shell: bash
        run: |
          set -euo pipefail

          if [ "${CONSUL_MODE}" = "local" ]; then
            docker compose up -d consul
          fi

          CONSUL_CHECK_ADDR="$(CONSUL_HTTP_ADDR="${CONSUL_CHECK_ADDR}" bash ./scripts/resolve-consul-addr.sh)"
          echo "Consul leader endpoint is reachable via ${CONSUL_CHECK_ADDR}"

          docker compose up -d --build omniroute-litefs

      - name: Wait for health
        shell: bash
        run: |
          set -euo pipefail

          check_health() {
            local base_url="${1:-http://localhost:20128}"
            if curl -fsS --max-time 5 "${base_url}/healthz" >/dev/null 2>&1; then
              return 0
            fi
            curl -fsS --max-time 5 "${base_url}/api/storage/health" >/dev/null 2>&1
          }

          for i in $(seq 1 24); do
            if check_health "http://localhost:20128"; then
              echo "health OK"
              exit 0
            fi
            echo "waiting health... (${i}/24)"
            sleep 5
          done
          echo "health check timeout"
          docker compose ps
          docker compose logs omniroute-litefs --tail 200
          exit 1

      - name: Smoke test
        shell: bash
        run: |
          bash ./scripts/litefs-smoke.sh http://localhost:20128

      - name: Enable cloudflared
        if: ${{ github.event.inputs.skip_cloudflared == 'false' }}
        run: |
          docker compose up -d cloudflared

      - name: Summary
        run: |
          docker compose ps
          echo "deploy-litefs completed"

      - name: Debug logs on failure
        if: failure()
        run: |
          docker compose ps || true
          docker compose logs consul --tail 200 || true
          docker compose logs omniroute-litefs --tail 200 || true
          docker compose logs cloudflared --tail 200 || true
